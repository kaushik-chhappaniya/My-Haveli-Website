{{ define "title" }} ShreeNathJi Haweli - Home {{ end }}

{{ define "content" }}
<div class="container">
  <h1>Welcome to the Haweli</h1>
  <h1 class="display-4">{{.subTitle}}</h1>
  <div class="mt-3">
    <strong>Message:</strong>
     {{.message}}</div>
     <div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="..." class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="..." class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="..." class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
      <div id="shreenathJiImage">
        <img
          src={{.ImgSrc}}
          alt="Haweli Image"
          class="img-fluid"
          style="cursor: zoom-in; width: 100%; max-width: 800px"
        />
      </div>
  <div class="mt-4">
    <small class="text-muted">Last updated: {{.timestamp}}</small>
  </div>
</div>
{{ end }}

{{ define "index" }}
  {{ template "base" . }}
{{ end }}
