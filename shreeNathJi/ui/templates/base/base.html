{{define "base"}}
<!doctype html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}श्री नाथजी हवेली - Shree Nathji Haweli{{end}}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
          crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="श्री नाथजी हवेली - Shree Nathji Haweli, Ahilyanagar, Maharashtra. Experience divine darshan, temple events, and spiritual services.">
    <meta name="keywords" content="Shree Nathji, Temple, Haweli, Maharashtra, Ahilyanagar, Darshan, Hindu Temple, Devotion">
    <meta name="author" content="Shree Nathji Haweli">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
</head>
<body class="d-flex flex-column min-vh-100">
    {{template "header" .}}

    <main class="content-wrapper container-fluid">
        <div class="container">
            {{ block "content" . }}
            <div class="page-header">
                <h1>Welcome to श्री नाथजी हवेली</h1>
                <p class="mb-0">Experience Divine Bliss and Spiritual Peace</p>
            </div>
            {{ end }}
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
    
    <!-- Custom JavaScript -->
    <script src="/static/js/main.js"></script>

    {{template "footer" .}}
</body>
</html>
{{ end }}
