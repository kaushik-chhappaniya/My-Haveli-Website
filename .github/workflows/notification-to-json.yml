name: Add Notification to JSON

on:
  issues:
    types: [opened]

jobs:
  process-notification:
    if: contains(github.event.issue.title, 'notification')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout static website branch
        uses: actions/checkout@v4
        with:
          ref: static-website

      - name: Append notification to JSON
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const body = context.payload.issue.body;

            const titleMatch = body.match(/Notification Title\s*\n(.+)/);
            const contentMatch = body.match(/Notification Content\s*\n([\s\S]+?)\n\n/);
            const dateMatch = body.match(/Date\s*\n(.+)/);

            if (!titleMatch || !contentMatch || !dateMatch) {
              core.setFailed("Invalid issue format");
              return;
            }

            const newNotification = {
              title: titleMatch[1].trim(),
              content: contentMatch[1].trim(),
              timestamp: dateMatch[1].trim()
            };

            const path = 'data/notifications.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));

            data.notifications.unshift(newNotification);

            fs.writeFileSync(path, JSON.stringify(data, null, 2));

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notifications.json
          git commit -m "Add notification from issue #${{ github.event.issue.number }}"
          git push
